<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum 2026 — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #efeae0; font-family: 'Manrope', system-ui, sans-serif; }
  * { -webkit-tap-highlight-color: transparent; }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="variation-a.jsx"></script>
<script type="text/babel" src="variation-b.jsx"></script>

<script type="text/babel">
(function () {
  const { DesignCanvas, DCSection, DCArtboard, IOSDevice } = window;

  // Wrap an app component in an iOS frame artboard.
  // Top inset clears the iOS status bar / Dynamic Island so the app
  // masthead doesn't draw under "9:41" or the island pill.
  function PhoneFrame({ children }) {
    return (
      <IOSDevice width={390} height={840}>
        <div style={{ height: '100%', width: '100%', position: 'relative', paddingTop: 54, boxSizing: 'border-box' }}>
          {children}
        </div>
      </IOSDevice>
    );
  }

  function App() {
    const ABW = 430;
    const ABH = 900;
    return (
      <DesignCanvas>
        <DCSection
          id="album-redesign"
          title="Álbum Mundial 2026 — Anthropic dark theme"
          subtitle="Warm layered grays · terracotta accent · system sans · generous spacing"
        >
          <DCArtboard id="anthropic" label="Anthropic dark — warm grays, terracotta accent, minimal" width={ABW} height={ABH}>
            <PhoneFrame>
              <window.AnthropicApp />
            </PhoneFrame>
          </DCArtboard>
          <DCArtboard id="scoreboard" label="Reference · Scoreboard (old)" width={ABW} height={ABH}>
            <PhoneFrame>
              <window.ScoreboardApp />
            </PhoneFrame>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
</body>
</html>
